<!DOCTYPE html>
<html>
<head>
<title>JobFlow</title>

<style>
body{
    font-family: Arial;
    background-color:#f4f6f8;
}

.container{
    width:80%;
    margin:auto;
}

.job-card{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>

</head>

<body>

<div class="container">

<h1>Available Jobs</h1>

{% for job in jobs %}

<div class="job-card">

<h2>{{ job.title }}</h2>

<p><b>Company:</b> {{ job.company }}</p>
<p><b>Location:</b> {{ job.location }}</p>
<p><b>Salary:</b> {{ job.salary }}</p>
<p>{{ job.description }}</p>

<a href="/apply/{{ job.id }}/">
<button>Apply Job</button>
</a>

</div>

{% endfor %}

</div>

</body>
</html>
